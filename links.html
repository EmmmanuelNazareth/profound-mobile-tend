<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#3C8E39;--green-l:#52b84f;--bg:#080808;--white:#f4f2ee;}
html,body{background:var(--bg);color:var(--white);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;min-height:100svh;background:radial-gradient(ellipse at top,rgba(60,142,57,0.08),transparent 55%),var(--bg);}
.logo{margin-bottom:2.2rem;}
.logo img{height:58px;width:auto;display:block;}
.badge{width:96px;height:96px;border-radius:50%;border:1px solid rgba(60,142,57,0.35);background:rgba(8,8,8,0.72);display:flex;align-items:center;justify-content:center;margin:0 auto 1.8rem;animation:spin 22s linear infinite;}
.badge-in{display:flex;flex-direction:column;align-items:center;animation:spin 22s linear infinite reverse;}
.badge span{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--green-l);}
.badge p{font-size:0.46rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,242,238,0.75);line-height:1.4;text-align:center;margin-top:0.15rem;}
@keyframes spin{to{transform:rotate(360deg);}}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,2.6rem);font-weight:600;text-align:center;margin-bottom:0.4rem;letter-spacing:-0.01em;}
h1 em{color:var(--green);font-style:italic;}
.tag{font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--green-l);text-align:center;margin-bottom:2.6rem;font-weight:500;}
.links{display:flex;flex-direction:column;gap:0.85rem;width:100%;max-width:380px;}
.lnk{display:flex;align-items:center;gap:1rem;padding:1.15rem 1.25rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;text-decoration:none;color:var(--white);font-size:0.94rem;font-weight:500;transition:all 0.22s;}
.lnk:hover,.lnk:active{background:rgba(60,142,57,0.12);border-color:rgba(60,142,57,0.45);transform:translateY(-1px);}
.ico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;color:#fff;font-weight:700;}
.ico.ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);}
.ico.fb{background:#1877f2;}
.ico.th{background:#000;border:1px solid rgba(255,255,255,0.35);}
.lnk-info{flex:1;display:flex;flex-direction:column;}
.lnk-info strong{font-size:0.96rem;font-weight:600;letter-spacing:0.01em;}
.lnk-info span{font-size:0.74rem;color:rgba(244,242,238,0.55);margin-top:0.15rem;letter-spacing:0.04em;}
.arr{color:rgba(244,242,238,0.4);font-size:1.1rem;}
.more{margin-top:2rem;display:flex;flex-direction:column;gap:0.6rem;align-items:center;color:rgba(244,242,238,0.55);font-size:0.78rem;}
.more a{color:var(--green-l);text-decoration:none;letter-spacing:0.04em;}
.more a:hover{text-decoration:underline;}
.foot{margin-top:2.4rem;font-size:0.66rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(119,119,119,0.55);}
*{-webkit-tap-highlight-color:transparent;}
</style>
</head>
